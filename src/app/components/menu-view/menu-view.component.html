<div class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100"
     appPullToRefresh (pullRefresh)="onPullRefresh($event)">

  <div class="max-w-7xl mx-auto px-5 sm:px-6 lg:px-8 py-6">

    <!-- Hero -->
    <div class="text-center mb-6 sm:mb-10 animate-slideInDown">
      <h1 class="text-3xl sm:text-5xl font-bold text-gray-800 mb-2 sm:mb-4">
        Nuestro <span class="text-[#ed450d]">Menú</span>
      </h1>
      <p class="text-base sm:text-xl text-gray-500 max-w-2xl mx-auto">
        Ingredientes frescos, preparados con mucho amor
      </p>

      <!-- Estado de atención -->
      <div *ngIf="openState.label" class="mt-4 flex flex-col items-center gap-2">
        <button (click)="showHours = !showHours"
          class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-sm font-semibold press-effect transition-colors"
          [class]="openState.open ? 'bg-green-50 text-green-700 hover:bg-green-100' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'">
          <span class="relative flex h-2.5 w-2.5">
            <span *ngIf="openState.open"
                  class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2.5 w-2.5"
                  [class]="openState.open ? 'bg-green-500' : 'bg-gray-400'"></span>
          </span>
          {{ openState.label }}
          <svg class="h-3.5 w-3.5 transition-transform" [class.rotate-180]="showHours"
               fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>

        <div *ngIf="showHours"
             class="bg-white rounded-2xl shadow-lg p-4 w-full max-w-xs text-left animate-fadeInUp">
          <p class="text-xs font-bold text-gray-400 uppercase tracking-wide mb-2">Horario de atención</p>
          <div *ngFor="let d of businessHours"
               class="flex items-center justify-between py-1.5 text-sm border-b border-gray-50 last:border-0"
               [class.font-bold]="isToday(d.day)"
               [class.text-gray-900]="isToday(d.day)"
               [class.text-gray-500]="!isToday(d.day)">
            <span>{{ dayName(d.day) }}{{ isToday(d.day) ? ' · hoy' : '' }}</span>
            <span [class.text-gray-300]="d.closed">
              {{ d.closed ? 'Cerrado' : d.open + ' - ' + d.close }}
            </span>
          </div>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <!-- Menu Section -->
      <div class="lg:col-span-2">

        <app-category-filter
          [categories]="categories"
          [selectedCategory]="selectedCategory"
          (onCategoryChange)="onCategoryChange($event)">
        </app-category-filter>

        <!-- Skeletons mientras carga -->
        <div *ngIf="isLoading" class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <app-skeleton-card *ngFor="let s of skeletons" [showActions]="true"></app-skeleton-card>
        </div>

        <!-- Cards con stagger -->
        <div *ngIf="!isLoading" class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div *ngFor="let item of filteredItems; let i = index" [class]="staggerClass(i)">
            <app-menu-card [item]="item"></app-menu-card>
          </div>
        </div>

        <!-- Empty state -->
        <div *ngIf="!isLoading && filteredItems.length === 0"
             class="text-center py-16 animate-fadeIn">
          <div class="text-6xl mb-4">🍽️</div>
          <h3 class="text-xl font-semibold text-gray-500 mb-2">Sin platillos disponibles</h3>
          <p class="text-gray-400">Prueba con otra categoría</p>
        </div>

      </div>

      <!-- Cart Desktop -->
      <div class="hidden lg:block lg:col-span-1">
        <div class="sticky top-20">
          <app-cart-summary></app-cart-summary>
        </div>
      </div>
    </div>
  </div>

  <!-- FAB carrito mobile -->
  <button *ngIf="cartItemCount > 0"
    (click)="toggleMobileCart()"
    class="lg:hidden fixed bottom-20 right-4 z-30 bg-[#ed450d] text-white w-14 h-14 rounded-full shadow-2xl
           flex items-center justify-center font-bold text-lg press-effect animate-bounceIn
           ring-4 ring-[#ed450d]/30">
    {{cartItemCount}}
  </button>

  <!-- Mobile Cart Bottom Sheet -->
  <div *ngIf="showMobileCart"
       class="lg:hidden fixed inset-0 z-50"
       (click)="appService.setCartOpen(false)">
    <div class="absolute inset-0 bg-black/50 animate-fadeIn"></div>

    <!-- Sheet -->
    <div class="absolute bottom-0 inset-x-0 bg-white rounded-t-3xl flex flex-col animate-slideInUp"
         style="max-height: 88vh;"
         [style.transform]="'translateY(' + sheetTranslate + 'px)'"
         [style.transition]="sheetDragging ? 'none' : 'transform 0.28s cubic-bezier(0.32,0.72,0,1)'"
         (click)="$event.stopPropagation()">

      <!-- Drag handle — arrastra aquí para cerrar -->
      <div class="flex-shrink-0 flex flex-col items-center cursor-grab active:cursor-grabbing pt-3 pb-2"
           (touchstart)="onSheetDragStart($event)"
           (touchmove)="onSheetDragMove($event)"
           (touchend)="onSheetDragEnd()">
        <div class="w-10 h-1.5 bg-gray-200 rounded-full"></div>
      </div>

      <!-- Header fijo -->
      <div class="flex-shrink-0 px-5 pb-3 flex justify-between items-center border-b border-gray-100">
        <h2 class="text-xl font-bold text-gray-900">Tu Pedido</h2>
        <button (click)="appService.setCartOpen(false)"
                class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 press-effect hover:bg-gray-200 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Contenido scrollable -->
      <div class="flex-1 overflow-y-auto overscroll-contain px-5 py-4">
        <app-cart-summary></app-cart-summary>
      </div>
    </div>
  </div>

</div>
