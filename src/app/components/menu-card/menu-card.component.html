<div class="bg-white rounded-2xl shadow-md overflow-hidden card-lift cursor-pointer">
  <div class="relative h-48 overflow-hidden bg-gray-100">
    <img
      *ngIf="item.image && !imgFailed"
      [src]="item.image"
      [alt]="item.name"
      loading="lazy"
      (error)="imgFailed = true"
      class="w-full h-full object-cover transition-transform duration-500 hover:scale-105"
    />
    <div *ngIf="!item.image || imgFailed"
         class="w-full h-full flex flex-col items-center justify-center text-gray-300">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
    </div>
    <div class="absolute top-3 right-3">
      <div class="bg-[#fac20a] text-[#2a23b8] px-2 py-1 rounded-full text-sm font-bold">
        ${{item.price.toFixed(2)}}
      </div>
    </div>
    <div *ngIf="item.customizable" class="absolute top-3 left-3">
      <div class="bg-[#ed450d] text-white px-2 py-1 rounded-full text-xs font-medium flex items-center">
        <lucide-icon [img]="Settings" class="h-3 w-3 mr-1"></lucide-icon>
        Personalizable
      </div>
    </div>
  </div>

  <div class="p-4 sm:p-6">
    <h3 class="text-lg sm:text-xl font-bold text-gray-800 mb-1.5">{{item.name}}</h3>
    <p class="text-gray-600 text-sm mb-3 line-clamp-2">{{item.description}}</p>

    <div *ngIf="item.available" class="space-y-4">
      <!-- Customization Options -->
      <div *ngIf="item.customizable && item.ingredients && showCustomization && isAuthenticated" class="border-t pt-4">
        <h4 class="font-semibold text-gray-800 mb-3">Personaliza tu pedido:</h4>
        <div class="space-y-2 max-h-40 overflow-y-auto">
          <label *ngFor="let ingredient of item.ingredients"
                 class="flex items-center space-x-2 text-sm">
            <input
              type="checkbox"
              [checked]="isIngredientSelected(ingredient)"
              (change)="toggleIngredient(ingredient, $event)"
              class="rounded border-gray-300 text-[#ed450d] focus:ring-[#ed450d]"
            />
            <span [class]="isIngredientSelected(ingredient) ? 'text-gray-800' : 'text-gray-500 line-through'">
              {{ingredient}}
            </span>
          </label>
        </div>
      </div>

      <!-- Cantidad -->
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-3">
          <button
            (click)="decreaseQuantity()"
            class="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition-colors">
            <lucide-icon [img]="Minus" class="h-4 w-4"></lucide-icon>
          </button>
          <span class="font-medium text-lg w-8 text-center">{{quantity}}</span>
          <button
            (click)="increaseQuantity()"
            class="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition-colors">
            <lucide-icon [img]="Plus" class="h-4 w-4"></lucide-icon>
          </button>
        </div>

        <button *ngIf="item.customizable && isAuthenticated"
          (click)="toggleCustomization()"
          [class]="showCustomization ? 'bg-[#8624ce] text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'"
          class="px-3 py-2 rounded-lg font-medium transition-colors flex items-center gap-1 text-sm">
          <lucide-icon [img]="Settings" class="h-4 w-4"></lucide-icon>
          <span>{{showCustomization ? 'Ocultar' : 'Personalizar'}}</span>
        </button>
      </div>

      <!-- Botón agregar -->
      <button
        (click)="addToCart()"
        [disabled]="isAdding"
        [class]="isAdding
          ? 'bg-green-500 text-white scale-95'
          : 'bg-[#ed450d] hover:bg-[#ed450d]/90 text-white press-effect'"
        class="w-full py-2.5 rounded-xl font-semibold transition-all duration-300">
        {{isAdding ? '¡Agregado! ✓' : 'Agregar al pedido'}}
      </button>
    </div>

    <div *ngIf="!item.available" class="text-center">
      <span class="inline-block bg-gray-100 text-gray-500 px-4 py-2 rounded-lg">
        No disponible
      </span>
    </div>
  </div>
</div>
