<header class="header-glass text-white shadow-lg sticky top-0 z-50 animate-slideInDown">
  <div class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-14 sm:h-16">
      <!-- Logo -->
      <div class="flex items-center space-x-2 min-w-0">
        <lucide-icon [img]="ChefHat" class="h-7 w-7 sm:h-8 sm:w-8 flex-shrink-0"></lucide-icon>
        <h1 class="text-base sm:text-xl font-bold truncate">Retro Garage</h1>
      </div>

      <!-- Navigation -->
      <div class="flex items-center space-x-1 sm:space-x-3">
        <!-- Connection Status — solo en kitchen, texto oculto en mobile -->
        <app-connection-status *ngIf="currentView === 'kitchen' && isAuthenticated"></app-connection-status>

        <!-- Notifications — solo en kitchen -->
        <app-notification-panel *ngIf="currentView === 'kitchen' && isAuthenticated"></app-notification-panel>

        <!-- Cart — solo en menu -->
        <div *ngIf="currentView === 'menu'" class="relative">
          <button class="flex items-center bg-white/10 hover:bg-white/20 p-2 sm:px-3 sm:py-2 rounded-lg transition-colors press-effect">
            <lucide-icon [img]="ShoppingCart" class="h-5 w-5"></lucide-icon>
            <span *ngIf="cartItemCount > 0"
                  class="absolute -top-1.5 -right-1.5 bg-[#ed450d] text-white text-xs rounded-full h-5 w-5 flex items-center justify-center font-bold">
              {{cartItemCount}}
            </span>
          </button>
        </div>

        <!-- User name — oculto en mobile para ahorrar espacio -->
        <div *ngIf="isAuthenticated && currentUser" class="hidden sm:flex items-center space-x-2 bg-white/10 px-3 py-2 rounded-lg">
          <lucide-icon [img]="User" class="h-4 w-4"></lucide-icon>
          <span class="text-sm font-medium">{{currentUser.name}}</span>
        </div>

        <!-- Botones de navegación en menu view -->
        <div *ngIf="currentView === 'menu' && isAuthenticated" class="flex items-center space-x-1">
          <button *ngIf="canAccessInventory"
            (click)="goToInventory()"
            title="Inventario"
            class="flex items-center space-x-1.5 bg-[#fac20a] text-[#2a23b8] hover:bg-[#fac20a]/90 px-2.5 py-2 sm:px-4 rounded-lg font-medium transition-colors">
            <lucide-icon [img]="Boxes" class="h-4 w-4"></lucide-icon>
            <span class="hidden sm:inline text-sm">Inventario</span>
          </button>
          <button *ngIf="canAccessKitchen"
            (click)="goToKitchen()"
            title="Cocina"
            class="flex items-center space-x-1.5 bg-[#fac20a] text-[#2a23b8] hover:bg-[#fac20a]/90 px-2.5 py-2 sm:px-4 rounded-lg font-medium transition-colors">
            <lucide-icon [img]="ChefHat" class="h-4 w-4"></lucide-icon>
            <span class="hidden sm:inline text-sm">Cocina</span>
          </button>
          <button *ngIf="canAccessAdmin"
            (click)="goToPagos()"
            title="Pagos por aprobar"
            class="flex items-center space-x-1.5 bg-[#fac20a] text-[#2a23b8] hover:bg-[#fac20a]/90 px-2.5 py-2 sm:px-4 rounded-lg font-medium transition-colors">
            <lucide-icon [img]="Receipt" class="h-4 w-4"></lucide-icon>
            <span class="hidden sm:inline text-sm">Pagos</span>
          </button>
          <button *ngIf="canAccessAdmin"
            (click)="goToAdmin()"
            title="Admin"
            class="flex items-center space-x-1.5 bg-[#fac20a] text-[#2a23b8] hover:bg-[#fac20a]/90 px-2.5 py-2 sm:px-4 rounded-lg font-medium transition-colors">
            <lucide-icon [img]="Settings" class="h-4 w-4"></lucide-icon>
            <span class="hidden sm:inline text-sm">Admin</span>
          </button>
          <button *ngIf="isCustomer"
            (click)="goToMisPedidos()"
            title="Mis pedidos"
            class="flex items-center space-x-1.5 bg-[#fac20a] text-[#2a23b8] hover:bg-[#fac20a]/90 px-2.5 py-2 sm:px-4 rounded-lg font-medium transition-colors">
            <lucide-icon [img]="ClipboardList" class="h-4 w-4"></lucide-icon>
            <span class="hidden sm:inline text-sm">Mis pedidos</span>
          </button>
          <button *ngIf="isCustomer"
            (click)="goToCuenta()"
            title="Mi cuenta"
            class="flex items-center space-x-1.5 bg-[#fac20a] text-[#2a23b8] hover:bg-[#fac20a]/90 px-2.5 py-2 sm:px-4 rounded-lg font-medium transition-colors">
            <lucide-icon [img]="User" class="h-4 w-4"></lucide-icon>
            <span class="hidden sm:inline text-sm">Mi cuenta</span>
          </button>
        </div>

        <!-- Volver al menú desde kitchen/admin -->
        <button *ngIf="currentView !== 'menu' && isAuthenticated"
          (click)="goToMenu()"
          title="Ver Menú"
          class="flex items-center space-x-1.5 bg-[#fac20a] text-[#2a23b8] hover:bg-[#fac20a]/90 px-2.5 py-2 sm:px-4 rounded-lg font-medium transition-colors">
          <lucide-icon [img]="Menu" class="h-4 w-4"></lucide-icon>
          <span class="hidden sm:inline text-sm">Ver Menú</span>
        </button>

        <!-- Login -->
        <button *ngIf="!isAuthenticated"
          (click)="showLogin()"
          class="flex items-center space-x-1.5 bg-white/10 hover:bg-white/20 px-2.5 py-2 sm:px-4 rounded-lg transition-colors">
          <lucide-icon [img]="User" class="h-5 w-5"></lucide-icon>
          <span class="hidden sm:inline text-sm">Iniciar Sesión</span>
        </button>

        <!-- Logout -->
        <button *ngIf="isAuthenticated"
          (click)="logout()"
          title="Salir"
          class="flex items-center bg-red-500 hover:bg-red-600 p-2 sm:px-3 sm:py-2 rounded-lg transition-colors">
          <lucide-icon [img]="LogOut" class="h-4 w-4"></lucide-icon>
          <span class="hidden sm:inline text-sm ml-1.5">Salir</span>
        </button>
      </div>
    </div>
  </div>
</header>
